services:
  web:
    container_name: alhimiya_web
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      PORT: 3000
      NOINDEX: "false"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    volumes:
      - leads_data:/usr/src/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - alhimiya
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.alhimiya.rule=Host(`alhimiya-stom.ru`)"
      - "traefik.http.routers.alhimiya.entrypoints=websecure"
      - "traefik.http.routers.alhimiya.tls=true"
      - "traefik.http.routers.alhimiya.tls.certresolver=le"
      - "traefik.http.routers.alhimiya.service=alhimiya"
      - "traefik.http.services.alhimiya.loadbalancer.server.port=3000"
      - "traefik.http.services.alhimiya.loadbalancer.responseForwarding.flushInterval=-1ms"
      - "traefik.http.routers.alhimiya-www.rule=Host(`www.alhimiya-stom.ru`)"
      - "traefik.http.routers.alhimiya-www.entrypoints=websecure"
      - "traefik.http.routers.alhimiya-www.tls=true"
      - "traefik.http.routers.alhimiya-www.tls.certresolver=le"
      - "traefik.http.routers.alhimiya-www.middlewares=alhimiya-www-redirect"
      - "traefik.http.middlewares.alhimiya-www-redirect.redirectregex.regex=^https://www\\.alhimiya-stom\\.ru(.*)"
      - "traefik.http.middlewares.alhimiya-www-redirect.redirectregex.replacement=https://alhimiya-stom.ru$${1}"
      - "traefik.http.middlewares.alhimiya-www-redirect.redirectregex.permanent=true"

volumes:
  leads_data:

networks:
  alhimiya:
    driver: bridge
  web:
    external: true
